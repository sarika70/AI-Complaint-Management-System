<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Complaint Dashboard</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Complaint</th>
<th>Category</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
